name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Check out your repo code
      - uses: actions/checkout@v4

      # 2️⃣ Set up Node (LTS)
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # 3️⃣ Install pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4️⃣ Cache pnpm store to speed up installs
      - uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # 5️⃣ Install dependencies
      - run: pnpm install --frozen-lockfile

      # 6️⃣ Run linter
      - run: pnpm -s -w run lint || true
